# opencode AI 辅助工作流
# 当 issue / PR 评论中出现 /oc 或 /opencode 时自动触发
name: opencode

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    # 仅在包含触发指令时运行
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode') ||
      contains(github.event.issue.body, ' /oc') ||
      startsWith(github.event.issue.body, '/oc') ||
      contains(github.event.issue.body, ' /opencode') ||
      startsWith(github.event.issue.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install opencode v1.15.1
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash -s -- --version v1.15.1

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run opencode
        shell: bash
        run: opencode github run
        env:
          # 使用 big-pickle 模型
          MODEL: opencode/big-pickle
          USE_GITHUB_TOKEN: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
